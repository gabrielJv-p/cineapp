<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>🔍 Buscar Filmes</ion-title>
    <ion-buttons slot="start">
      <ion-button routerLink="/home">← Voltar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Buscar Filmes</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ion-searchbar
      placeholder="Buscar filme..."
      (ionInput)="searchMovie($event)">
    </ion-searchbar>

    <app-movie-card
      *ngFor="let movie of movies"
      [movie]="movie">
    </app-movie-card>
  </div>
</ion-content>
