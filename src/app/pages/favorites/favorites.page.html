<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>❤️ Favoritos</ion-title>
    <ion-buttons slot="start">
      <ion-button routerLink="/home">← Voltar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Meus Favoritos</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <p *ngIf="movies.length === 0">Nenhum filme favorito ainda.</p>

    <app-movie-card
      *ngFor="let movie of movies"
      [movie]="movie">
    </app-movie-card>
  </div>
</ion-content>
