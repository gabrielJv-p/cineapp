<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Detalhes do Filme</ion-title>
    <ion-buttons slot="start">
        <ion-button routerLink="/home">← Voltar</ion-button>
      </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Detalhes do Filme</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container" *ngIf="movie">
    <img *ngIf="movie.poster_path" [src]="getPosterUrl()" [alt]="movie.title">

    <h2>{{ movie.title }}</h2>

    <p>⭐ {{ movie.vote_average }}</p>

    <p>{{ movie.overview }}</p>

    <p>Data de lançamento: {{ movie.release_date }}</p>

    <ion-button (click)="toggleFavorite()">
      {{ isFavorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos' }}
    </ion-button>
  </div>
</ion-content>
