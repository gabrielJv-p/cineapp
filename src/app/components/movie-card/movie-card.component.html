<ion-card [appHighlight]="movie.vote_average" [routerLink]="['/details', movie.id]">

  <img *ngIf="movie.poster_path" [src]="getPosterUrl()" [alt]="movie.title">

  <ion-card-header>

    <ion-card-title>
      {{ movie.title }}
    </ion-card-title>

    <p>
      ⭐ {{ movie.vote_average }}
    </p>

  </ion-card-header>

</ion-card>
