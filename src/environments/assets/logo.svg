<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 58 590 200">
  <style>
    .logo-cine { font-family: sans-serif; font-size: 52px; font-weight: 800; fill: #F2F2F7; }
    .logo-app { font-family: sans-serif; font-size: 52px; font-weight: 800; fill: #7C3AED; }
    .tagline { font-family: sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; }
  </style>

  <!-- Corpo da claquete -->
  <rect x="60" y="110" width="220" height="160" rx="12" fill="#1F2430"/>

  <!-- Topo da claquete -->
  <rect x="60" y="80" width="220" height="44" rx="10" fill="#171A21"/>

  <!-- Listras da claquete -->
  <clipPath id="clip-top">
    <rect x="60" y="80" width="220" height="44" rx="10"/>
  </clipPath>
  <g clip-path="url(#clip-top)">
    <rect x="60" y="80" width="28" height="44" fill="#7C3AED"/>
    <rect x="116" y="80" width="28" height="44" fill="#7C3AED"/>
    <rect x="172" y="80" width="28" height="44" fill="#7C3AED"/>
    <rect x="228" y="80" width="28" height="44" fill="#7C3AED"/>
  </g>

  <!-- Linha divisória -->
  <line x1="60" y1="124" x2="280" y2="124" stroke="#2A2F3A" stroke-width="2"/>

  <!-- Botões da claquete -->
  <rect x="95" y="66" width="16" height="18" rx="3" fill="#EC4B99"/>
  <rect x="145" y="66" width="16" height="18" rx="3" fill="#EC4B99"/>
  <rect x="195" y="66" width="16" height="18" rx="3" fill="#EC4B99"/>
  <rect x="245" y="66" width="16" height="18" rx="3" fill="#EC4B99"/>

  <!-- Tela dentro da claquete -->
  <rect x="80" y="138" width="180" height="112" rx="8" fill="#0E1117"/>

  <!-- Botão play -->
  <circle cx="170" cy="194" r="28" fill="#7C3AED" opacity="0.15"/>
  <circle cx="170" cy="194" r="20" fill="#7C3AED"/>
  <polygon points="164,186 164,202 180,194" fill="#F2F2F7"/>

  <!-- Texto -->
  <text x="320" y="148" class="logo-cine">Cine</text>
  <text x="443" y="148" class="logo-app">App</text>
  <rect x="320" y="162" width="240" height="2" rx="1" fill="#7C3AED" opacity="0.5"/>
  <text x="320" y="188" class="tagline">Seu próximo filme começa aqui.</text>
  <circle cx="320" cy="213" r="5" fill="#7C3AED"/>
  <circle cx="336" cy="213" r="5" fill="#EC4B99"/>
  <circle cx="352" cy="213" r="5" fill="#2A2F3A"/>
</svg>